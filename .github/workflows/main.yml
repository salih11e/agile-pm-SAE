name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Code Quality
    defaults:
      run:
        working-directory: ./tasks-api
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './tasks-api/package-lock.json'
      - run: npm ci
      - run: npm run lint || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    name: Unit Tests
    defaults:
      run:
        working-directory: ./tasks-api
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './tasks-api/package-lock.json'
      - run: npm ci
      - run: npm test || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    name: Docker Build
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2
      - uses: docker/build-push-action@v4
        with:
          context: ./tasks-api
          push: false
          tags: tasks-api:ci-${{ github.sha }}
